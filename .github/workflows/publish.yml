name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload built distributions to GitHub Release assets
        required: true
        default: false
        type: boolean
      release_tag:
        description: Existing Git tag to upload assets to when running manually
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v5
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload distributions to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Validate manual release tag input
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_release && inputs.release_tag == ''
        run: |
          echo "upload_to_release=true 时必须填写 release_tag"
          exit 1

      - name: Publish distributions to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing dist/*
